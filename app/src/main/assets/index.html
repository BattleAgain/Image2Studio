<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Image2Studio</title><style>

border:1px solid var(--line);border-radius:22px;padding:14px}.hist-top{font-size:13px;color:#dbe4ff;font-weight:700}.hist-prompt{color:var(--muted);font-size:13px;line-height:1.45;margin:6px 0 10px}.thumbs{display:flex;gap:8px;overflow:auto}.thumbs img{width:82px;height:82px;border-radius:16px;object-fit:cover}.bottom-nav{position:fixed;left:0;right:0;bottom:0;height:86px;background:#0b0f18;border-top:1px solid #273247;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 10px 10px;box-shadow:0 -8px 30px #000;z-index:10}.navbtn{background:transparent;border-radius:18px;color:#94a3b8;padding:5px 0;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px}.navbtn b{font-size:20px}.navbtn.on{background:linear-gradient(135deg,var(--p),var(--p2));color:white}.toast{position:fixed;left:18px;right:18px;bottom:98px;background:#111827;border:1px solid #334155;border-radius:18px;padding:14px;display:none;color:white;z-index:20}.log{white-space:pre-wrap;color:#93a4bd;font-size:13px;line-height:1.45}.model-item{padding:12px;border-radius:16px;background:#0c111b;margin:8px 0;color:#dbeafe}.row-entry{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px;border-radius:18px;background:#0c111b;color:#dbe4ff;margin:10px 0}.chev{color:#718096;font-size:22px}.switch-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.switch{width:62px;height:34px;border-radius:999px;background:#334155;position:relative}.switch.on{background:#22c5c8}.switch:after{content:"";position:absolute;width:28px;height:28px;border-radius:50%;background:#071018;top:3px;left:3px;transition:.18s}.switch.on:after{left:31px}.file-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:14px 0;border-bottom:1px solid #263047}.file-row:last-child{border-bottom:0}.file-size{color:#9aa7bb}.backline{display:flex;align-items:center;gap:12px;margin:12px 0 18px}.backbtn{width:44px;height:44px;border-radius:50%;padding:0;background:#182235;font-size:26px}.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:99;padding:18px}.lightbox.on{display:flex}.lightbox img{max-width:100%;max-height:100%;border-radius:18px;object-fit:contain}.lightbox .x{position:absolute;top:18px;right:18px;width:42px;height:42px;border-radius:50%;background:#253044;font-size:24px;padding:0}.set-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;margin:10px 0}@media(max-width:390px){.app{padding-left:12px;padding-right:12px}.param-row{gap:6px}.param-row select{font-size:14px;padding:0 8px}.headline h2{font-size:25px}.status{display:none}.gallery{grid-template-columns:1fr}}
</style></head><body><main class="app"><header class="appbar"><div class="logo">I2</div><div class="title"><h1>Image2Studio</h1><p>v2.3.15 · Cloud</p></div><a class="ghbtn" href="https://github.com/BattleAgain/Image2Studio" onclick="Android.openUrl(this.href);return false" aria-label="GitHub 项目"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.64 0 8.13c0 3.59 2.29 6.63 5.47 7.7.4.08.55-.18.55-.39 0-.19-.01-.83-.01-1.5-2.01.38-2.53-.5-2.69-.96-.09-.23-.48-.96-.82-1.16-.28-.15-.68-.53-.01-.54.63-.01 1.08.59 1.23.83.72 1.23 1.87.88 2.33.67.07-.53.28-.88.51-1.09-1.78-.2-3.64-.9-3.64-4.02 0-.89.31-1.62.82-2.19-.08-.2-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.89c.68 0 1.36.09 2 .27 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.96.08 2.16.51.57.82 1.3.82 2.19 0 3.13-1.87 3.82-3.65 4.02.29.25.54.74.54 1.5 0 1.09-.01 1.96-.01 2.23 0 .21.15.47.55.39A8.03 8.03 0 0 0 16 8.13C16 3.64 12.42 0 8 0Z"/></svg></a><div id="status" class="status">就绪</div></header><section id="txt" class="page on"><div class="headline"><h2>文生图</h2><span>Auto / 4K</span></div><div class="panel"><div class="param-row"><div><div class="mini-label">比例</div><select id="ratio"></select></div><div><div class="mini-label">清晰度</div><select id="quality"></select></div><div><div class="mini-label">数量</div><select id="num"></select></div></div><div class="prompt-label">提示词</div><textarea id="prompt" placeholder="描述你想生成的画面"></textarea><div class="prompt-label">反向提示词</div><input id="neg" placeholder="可选"><div style="height:14px"></div><button id="gen" class="primary"><span class="btnText">开始生成</span><span id="genTimer" class="timer-live"></span></button><div id="genActions" class="actions two" style="display:none;margin-top:0"><button id="genBusy" class="ghost" disabled style="height:58px;border-radius:22px;font-size:18px;font-weight:900">生成中</button><button id="genNext" class="primary">下一张</button></div></div><div id="resultCard" class="result compact"><h3>当前结果 <span id="resultTime" class="time-badge"></span></h3><div id="results" class="result-body empty">生成后显示结果</div><div class="actions three result-body"><button id="shareCur" class="ghost">分享</button><button id="editCur" class="primary">编辑</button><button id="saveCur" class="green">保存</button></div></div></section><section id="edit" class="page"><div class="headline"><h2>图生图</h2><span>1-4 张参考图</span></div><div class="panel"><button id="pick" class="ghost" style="width:100%">导入图片</button><p id="picked" style="color:var(--muted);font-size:13px">未选择图片</p><div id="pickedGrid" class="picked-grid"></div><div class="param-row"><div><div class="mini-label">比例</div><select id="eratio"></select></div><div><div class="mini-label">清晰度</div><select id="equality"></select></div><div><div class="mini-label">数量</div><select id="enum"></select></div></div><div class="prompt-label">编辑提示词</div><textarea id="eprompt" placeholder="描述你想如何修改图片"></textarea><div style="height:14px"></div><button id="editBtn" class="primary"><span class="btnText">开始编辑</span><span id="editTimer" class="timer-live"></span></button><div id="editActions" class="actions two" style="display:none;margin-top:0"><button id="editBusy" class="ghost" disabled style="height:58px;border-radius:22px;font-size:18px;font-weight:900">生成中</button><button id="editNext" class="primary">下一张</button></div></div><div id="editResultCard" class="result compact"><h3>图生图结果 <span id="editResultTime" class="time-badge"></span></h3><div id="editResults" class="result-body empty">编辑后显示结果</div><div class="actions three result-body"><button id="shareEdit" class="ghost">分享</button><button id="editEdit" class="primary">编辑</button><button id="saveEdit" class="green">保存</button></div></div></section><section id="hist" class="page"><div class="headline"><h2>历史</h2><span>本机画廊</span></div><div class="set-card"><div id="history" class="hist"><div class="empty">暂无历史</div></div><button id="clearHist" class="ghost" style="width:100%;margin-top:12px">清空历史</button></div></section><section id="set" class="page"><div class="headline"><h2>设置</h2><span>接口配置</span></div><div class="set-card"><div class="mini-label">Base URL</div><input id="base"><div class="mini-label">云任务服务 URL</div><input id="cloud" placeholder="https://i2.tmlgbd.cc.cd"><label style="display:flex;gap:8px;align-items:center;margin:12px 0;color:#aab5ca"><input id="cloudMode" type="checkbox" style="width:auto;height:auto">云任务模式（推荐）</label><div class="mini-label">API Key</div><input id="key" type="password"><div class="mini-label">模型</div><input id="model"><label style="display:flex;gap:8px;align-items:center;margin:12px 0;color:#aab5ca"><input id="remember" type="checkbox" style="width:auto;height:auto">记住 API Key</label><div class="actions"><button id="models" class="primary">获取模型</button><button id="saveSet" class="ghost">保存设置</button></div><div id="modelList"></div></div><div class="set-card"><div class="row-entry" onclick="openLogs()"><strong>日志</strong><span class="chev">›</span></div><div id="log" class="log">等待操作</div></div></section><section id="logs" class="page"><div class="backline"><button class="backbtn" onclick="document.querySelector('[data-page=set]').click()">‹</button><div class="headline" style="flex:1;margin:0"><h2>日志</h2><span>错误捕获</span></div></div><div class="set-card"><div class="switch-row"><strong>启用日志</strong><div id="logSwitch" class="switch" onclick="toggleLogs()"></div></div><p style="color:var(--muted);font-size:13px;line-height:1.5">启用后，只按天记录错误到应用私有文件。不记录成功，不记录提示词、API Key 等敏感信息。</p></div><div class="set-card"><h3 style="margin-top:0">日志文件</h3><div id="logFiles" class="log">暂无日志文件</div></div></section></main><nav class="bottom-nav"><button class="navbtn on" data-page="txt"><b>✦</b>文生图</button><button class="navbtn" data-page="edit"><b>◈</b>图生图</button><button class="navbtn" data-page="hist"><b>▣</b>历史</button><button class="navbtn" data-page="set"><b>⚙</b>设置</button></nav><div id="toast" class="toast"></div><div id="lightbox" class="lightbox" onclick="closeImg()"><button class="x" onclick="closeImg();event.stopPropagation()">×</button><img id="bigImg"></div><script>
const ratios=['Auto','16:9','9:16','1:1','4:3','3:4'], qs=['Auto','4K'], nums=['1','2','3','4'];
let cur=[];
let seq=1, pending={};
let activeCloudTasks={text:null, edit:null};let formRun={text:0,edit:0};
function $(id){return document.getElementById(id)}
function fill(id,a){$(id).innerHTML=a.map(x=>`<option>${x}</option>`).join('')}
['ratio','eratio'].forEach(id=>fill(id,ratios));
['quality','equality'].forEach(id=>fill(id,qs));
['num','enum'].forEach(id=>fill(id,nums));
function toast(s){let t=$('toast');t.textContent=s;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function log(s){$('log').textContent=s}
function setStatus(s){$('status').textContent=s}
document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.navbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(b.dataset.page).classList.add('on');if(b.dataset.page==='hist'){loadHist();resumeCloudTasks()}if(b.dataset.page==='set'){refreshLogs()}});
function openLogs(){document.querySelectorAll('.navbtn').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$('logs').classList.add('on');refreshLogs()}
function refreshLogs(){let enabled=Android.isErrorLogEnabled()==='true';$('logSwitch').classList.toggle('on',enabled);let files=JSON.parse(Android.listErrorLogs());$('logFiles').innerHTML=files.length?files.map(f=>`<div class="file-row" onclick="Android.shareErrorLog('${f.name}')"><span>${f.name}</span><span class="file-size">${f.size}</span><span class="chev">›</span></div>`).join(''):'暂无日志文件'}
function toggleLogs(){let on=!$('logSwitch').classList.contains('on');Android.setErrorLogEnabled(on);refreshLogs();toast(on?'已启用日志':'已关闭日志')}
function startTimer(liveId,finalId){let live=$(liveId),fin=$(finalId),st=performance.now();if(fin){fin.style.display='none';fin.textContent=''}if(live){live.style.display='block';live.textContent='0.01s'}let t=setInterval(()=>{let v=Math.max(.01,(performance.now()-st)/1000);if(live)live.textContent=v.toFixed(2)+'s'},50);return{st,t,live,fin}}
function finishTimer(x,ok){if(!x)return;clearInterval(x.t);let v=Math.max(.01,(performance.now()-x.st)/1000).toFixed(2)+'s';if(x.live){x.live.style.display='none';x.live.textContent=''}if(ok&&x.fin){x.fin.textContent=v;x.fin.style.display='inline-block'}else if(x.fin){x.fin.style.display='none';x.fin.textContent=''}}
function openImg(src){$('bigImg').src=src;$('lightbox').classList.add('on')}
function closeImg(){$('lightbox').classList.remove('on');$('bigImg').src=''}
function settings(){return{baseUrl:($('base')&&$('base').value.trim())||'https://factory.pub',cloudUrl:($('cloud')&&$('cloud').value.trim())||'https://i2.tmlgbd.cc.cd',cloudMode:($('cloudMode')&&$('cloudMode').checked)||false,apiKey:$('key').value.trim(),model:$('model').value.trim()||'gpt-image-2',remember:$('remember').checked}}
function loadSet(){let s=JSON.parse(Android.getSettings());$('base').value=s.baseUrl||'https://factory.pub';if($('cloud'))$('cloud').value=s.cloudUrl||'https://i2.tmlgbd.cc.cd';if($('cloudMode'))$('cloudMode').checked=s.cloudMode!==false;$('key').value=s.apiKey||'';$('model').value=s.model||'gpt-image-2';$('remember').checked=!!s.remember}
loadSet();
window.onAutoModel=o=>{if(o&&o.ok&&o.model){$('model').value=o.model;toast('已自动选择 '+o.model)}else if(o&&!o.ok&&o.error){log('自动获取模型失败：'+o.error)}};
setTimeout(()=>Android.autoSelectImage2Model(),300);
setTimeout(()=>resumeCloudTasks(),800);
$('saveSet').onclick=()=>{Android.saveSettings(JSON.stringify(settings()));toast('设置已保存')};
function call(fn,args,btn,doing){let id='r'+seq++;let label=btn&&btn.querySelector('.btnText'),old=label?label.textContent:(btn&&btn.textContent);if(btn){btn.disabled=true;if(label)label.textContent=doing;else btn.textContent=doing}setStatus(doing);return new Promise(res=>{pending[id]=r=>{if(btn){btn.disabled=false;if(label)label.textContent=old;else btn.textContent=old}setStatus('就绪');res(r)};Android[fn](id,...args)})}
window.nativeResolve=r=>{let cb=pending[r.id];if(cb){delete pending[r.id];cb(r)}};
function deviceToken(){let k='image2DeviceToken',v=localStorage.getItem(k);if(!v){v='dev-'+Date.now()+'-'+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);localStorage.setItem(k,v)}return v}
function saveCloudTask(t){let a=[];try{a=JSON.parse(localStorage.getItem('cloudTasks')||'[]')}catch(e){}a=a.filter(x=>x.id!==t.id);a.unshift(t);a=a.slice(0,50);localStorage.setItem('cloudTasks',JSON.stringify(a))}
function updateCloudTask(id,patch){let a=[];try{a=JSON.parse(localStorage.getItem('cloudTasks')||'[]')}catch(e){}a=a.map(x=>x.id===id?Object.assign(x,patch):x);localStorage.setItem('cloudTasks',JSON.stringify(a))}
function taskKey(mode){return mode==='edit'?'edit':'text'}
function modeName(mode){return mode==='edit'?'图生图':'文生图'}

function cnTime(raw){if(!raw)return '';try{return new Date(raw).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return raw}}
function renderHistItem(x,i){return `<div class="hist-item"><div class="hist-top">${cnTime(x.time)} · ${x.mode}<span class="time-badge" style="float:right;display:inline-block">${x.status||'local'}</span></div><div class="hist-prompt">${x.prompt}</div><div class="thumbs">${(x.paths||[]).map(p=>`<img onclick="openImg('file://${p}')" src="file://${p}">`).join('')}</div><div class="actions four"><button class="ghost" onclick='shareHist(${JSON.stringify(x.paths||[])})'>分享</button><button class="primary" onclick='editHist(${JSON.stringify(x.paths||[])})'>编辑</button><button class="green" onclick='saveHist(${JSON.stringify(x.paths||[])})'>保存</button><button class="danger" onclick='delHist(${i})'>删除</button></div><div class="muted" style="margin-top:8px;font-size:12px;word-break:break-all">${x.taskId?('任务ID: '+x.taskId+' · '):''}${x.error?('错误: '+x.error):''}</div></div>`}
function loadHist(){let h=JSON.parse(Android.loadHistory());$('history').innerHTML=h.length?h.map((x,i)=>renderHistItem(x,i)).join(''):'<div class="empty">暂无历史</div>'}
function saveHist(paths){let id='r'+seq++;pending[id]=r=>toast(r.ok?'已保存 '+r.saved+' 张':r.error);Android.saveHistoryItemToGallery(id,JSON.stringify(paths))}
function shareHist(paths){Android.shareHistoryItem(JSON.stringify(paths))}
function editHist(paths){Android.editHistoryItem(JSON.stringify(paths))}
function applyHistResult(r,msg){try{let j=JSON.parse(r);if(!j.ok){toast(j.error||'操作失败');return}if(j.history)$('history').innerHTML=j.history.length?j.history.map((x,i)=>renderHistItem(x,i)).join(''):'<div class="empty">暂无历史</div>';else loadHist();toast(msg)}catch(e){loadHist();toast(msg)}}
function delHist(i){applyHistResult(Android.deleteHistoryItem(i),'已删除')}
$('clearHist').onclick=()=>{applyHistResult(Android.clearHistory(),'已清空')};
function setPipelineUi(mode,on,label){let btn=mode==='edit'?$('editBtn'):$('gen'),box=mode==='edit'?$('editActions'):$('genActions'),busy=mode==='edit'?$('editBusy'):$('genBusy'),next=mode==='edit'?$('editNext'):$('genNext'),startText=mode==='edit'?'开始编辑':'开始生成';if(on){btn.disabled=true;btn.style.display='none';box.style.display='grid';busy.textContent=label||'生成中';next.dataset.ready='1'}else{btn.disabled=false;btn.style.display='block';btn.querySelector('.btnText').textContent=startText;box.style.display='none';busy.textContent='生成中';next.dataset.ready='0'}}
function resetPipeline(mode){formRun[taskKey(mode)]++;activeCloudTasks[taskKey(mode)]=null;if(mode==='edit'){$('eprompt').value='';$('editResults').className='empty';$('editResults').textContent='编辑后显示结果';$('editResultCard').classList.add('compact');try{Android.clearPickedImages()}catch(e){}}else{$('prompt').value='';$('neg').value='';$('results').className='empty';$('results').textContent='生成后显示结果';$('resultCard').classList.add('compact')}setPipelineUi(mode,false);toast('已准备下一张')}
function updateCloudHistory(taskId,mode,prompt,status,cloudUrl,createdAt,updatedAt,error,clientTaskId){return Android.upsertCloudHistoryItem(JSON.stringify({taskId:taskId,clientTaskId:clientTaskId||'',mode:modeName(mode),prompt:prompt,status:status,cloudUrl:cloudUrl,createdAt:createdAt,updatedAt:updatedAt,error:error||''}))}
async function importCloudTaskResult(mode,taskId,prompt,jsonResults){let r=await call('importCloudResults',[taskId,modeName(mode),prompt,jsonResults],null,'导入中');return r}
async function resumeCloudTasks(){let items=[];try{items=JSON.parse(Android.loadHistory()||'[]')}catch(e){items=[]}let s=settings();for(const x of items.filter(v=>v.taskId&&v.clientTaskId&&(['queued','running','retrying','submitting','importing'].includes(v.status)||(v.status==='succeeded'&&!(v.paths&&v.paths.length)))).slice(0,10)){if(String(x.taskId).startsWith('pending-'))continue;try{let tr=await fetch((x.cloudUrl||s.cloudUrl).replace(/\/$/,'')+'/api/tasks/'+x.taskId+'?clientTaskId='+encodeURIComponent(x.clientTaskId||'')+'&deviceToken='+encodeURIComponent(deviceToken()));let tj=await tr.json();if(!tj.ok)continue;let mode=x.mode==='图生图'?'edit':'text';await handleTaskState(mode,x.taskId,x.clientTaskId,tj.task.prompt||x.prompt,x.cloudUrl||s.cloudUrl,tj.task,true,undefined)}catch(e){}}loadHist()}
async function handleTaskState(mode,taskId,clientTaskId,prompt,cloudUrl,task,background,run){let st=task.status||'queued';let key=taskKey(mode);let isActive=activeCloudTasks[key]===taskId && (run===undefined || formRun[key]===run);if(st==='succeeded'){updateCloudHistory(taskId,mode,prompt,'importing',cloudUrl,task.createdAt||new Date().toISOString(),task.updatedAt||new Date().toISOString(),'',clientTaskId);loadHist();let finalResults=[];for(const it of (task.results||[])){if(it.kv&&it.fileUrl){let kr=await fetch(cloudUrl.replace(/\/$/,'')+it.fileUrl+'?clientTaskId='+encodeURIComponent(clientTaskId)+'&deviceToken='+encodeURIComponent(deviceToken()));let kj=await kr.json();if(kj.ok)finalResults.push({index:it.index,b64_json:kj.b64_json,fileUrl:kj.fileUrl})}else finalResults.push(it)}if(!finalResults.length){updateCloudHistory(taskId,mode,prompt,'import_failed',cloudUrl,task.createdAt||new Date().toISOString(),task.updatedAt||new Date().toISOString(),'结果为空或已过期',clientTaskId);loadHist();if(isActive){activeCloudTasks[taskKey(mode)]=null;setPipelineUi(mode,false)}return true}let rr=await importCloudTaskResult(mode,taskId,prompt,JSON.stringify(finalResults));if(!rr.ok){updateCloudHistory(taskId,mode,prompt,'import_failed',cloudUrl,task.createdAt||new Date().toISOString(),task.updatedAt||new Date().toISOString(),rr.error||'导入失败',clientTaskId);loadHist();if(isActive){activeCloudTasks[taskKey(mode)]=null;setPipelineUi(mode,false)}return true}if(isActive){activeCloudTasks[taskKey(mode)]=null;setPipelineUi(mode,false);show(finalResults,mode==='edit'?'edit':'txt');toast(modeName(mode)+'完成')}loadHist();return true}updateCloudHistory(taskId,mode,prompt,st,cloudUrl,task.createdAt||new Date().toISOString(),task.updatedAt||new Date().toISOString(),task.error||'',clientTaskId);loadHist();if(st==='running'||st==='queued'||st==='retrying'){if(isActive)setPipelineUi(mode,true,'生成中');return false}if(st==='failed'){if(isActive){activeCloudTasks[taskKey(mode)]=null;setPipelineUi(mode,false);toast(modeName(mode)+'失败：'+(task.error||'未知错误'))}return true}return false}

async function cloudGenerate(mode,args){let key=taskKey(mode);let run=++formRun[key];let s=settings();let clientTaskId='i2-'+Date.now()+'-'+Math.random().toString(36).slice(2);let localId='pending-'+clientTaskId;updateCloudHistory(localId,mode,args.prompt,'submitting',s.cloudUrl,new Date().toISOString(),new Date().toISOString(),'',clientTaskId);loadHist();let payload={apiKey:s.apiKey,deviceToken:deviceToken(),clientTaskId:clientTaskId,mode:mode,baseUrl:s.baseUrl,model:s.model,prompt:args.prompt,n:args.n,ratio:args.ratio,quality:args.quality};if(args.neg)payload.negativePrompt=args.neg;if(args.images)payload.editImages=args.images;setStatus('提交云任务');let cr=await fetch(s.cloudUrl.replace(/\/$/,'')+'/api/tasks',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});let cj=await cr.json();if(!cj.ok){updateCloudHistory(localId,mode,args.prompt,'failed',s.cloudUrl,new Date().toISOString(),new Date().toISOString(),cj.error||'云任务提交失败',clientTaskId);loadHist();throw new Error(cj.error||'云任务提交失败')}let taskId=cj.task.id;if(formRun[key]===run){activeCloudTasks[key]=taskId;setPipelineUi(mode,true,'生成中')}updateCloudHistory(taskId,mode,args.prompt,cj.task.status||'queued',s.cloudUrl,cj.task.createdAt||new Date().toISOString(),cj.task.updatedAt||new Date().toISOString(),'',clientTaskId);loadHist();monitorCloudTask(mode,taskId,payload.clientTaskId,args.prompt,s.cloudUrl,run).catch(e=>{updateCloudHistory(taskId,mode,args.prompt,'failed',s.cloudUrl,new Date().toISOString(),new Date().toISOString(),e.message||'云任务失败',clientTaskId);if(formRun[key]===run&&activeCloudTasks[key]===taskId){activeCloudTasks[key]=null;setPipelineUi(mode,false);toast(modeName(mode)+'失败：'+(e.message||e))}loadHist()});return taskId}
async function monitorCloudTask(mode,taskId,clientTaskId,prompt,cloudUrl,run){for(let i=0;i<180;i++){await new Promise(r=>setTimeout(r,2000));let tr=await fetch(cloudUrl.replace(/\/$/,'')+'/api/tasks/'+taskId+'?clientTaskId='+encodeURIComponent(clientTaskId)+'&deviceToken='+encodeURIComponent(deviceToken()));let tj=await tr.json();if(!tj.ok)throw new Error(tj.error||'查询云任务失败');let done=await handleTaskState(mode,taskId,clientTaskId,tj.task.prompt||prompt,cloudUrl,tj.task,false,run);if(done)return}throw new Error('云任务超时')}

function show(items,where='txt'){cur=items||[];let card=where==='edit'?'editResultCard':'resultCard', box=where==='edit'?'editResults':'results';$(card).classList.remove('compact');$(box).className=cur.length?'gallery':'empty';$(box).innerHTML=cur.length?cur.map((it,i)=>`<div class="imgcard"><img onclick="openImg('${it.fileUrl}')" src="${it.fileUrl}"><div class="imgcap">#${i+1} · 已入历史</div></div>`).join(''):'没有图片数据'}
$('genNext').onclick=()=>resetPipeline('text');
$('editNext').onclick=()=>resetPipeline('edit');
$('gen').onclick=async()=>{let s=settings();Android.saveSettings(JSON.stringify(s));if(s.cloudMode){try{await cloudGenerate('text',{prompt:$('prompt').value,neg:$('neg').value,n:parseInt($('num').value),ratio:$('ratio').value,quality:$('quality').value});toast('任务已排队')}catch(e){toast(e.message||e);log(e.message||e)}}else{let tm=startTimer('genTimer','resultTime');$('resultCard').classList.remove('compact');$('results').className='empty';$('results').textContent='生成中，请稍候...';let r=await call('generateText',[s.baseUrl,s.apiKey,s.model,$('prompt').value,$('neg').value,parseInt($('num').value),$('ratio').value,$('quality').value],$('gen'),'生成中...');if(!r.ok){finishTimer(tm,false);$('results').textContent='生成失败：'+r.error;toast(r.error);log(r.error);return}show(r.items);finishTimer(tm,true);loadHist();toast('生成完成')}}
$('pick').onclick=()=>Android.pickImages();
window.onImagesPicked=o=>{renderPicked(o.uris||[])};
function renderPicked(uris){selectedUris=(uris||[]).slice(0,4);$('picked').textContent=selectedUris.length?'已选择 '+selectedUris.length+' 张图片':'未选择图片';$('pickedGrid').innerHTML=selectedUris.map((u,i)=>`<div class="pick-card"><img onclick="openImg('${u}')" src="${u}"><button onclick="removePick(${i})">×</button></div>`).join('')}
function removePick(i){Android.removePickedImage(i)}
$('editBtn').onclick=async()=>{let s=settings();Android.saveSettings(JSON.stringify(s));if(s.cloudMode){try{let uris=JSON.parse(Android.getPickedImagesJson());if(!uris.length)throw new Error('请先选择参考图');$('editResultCard').classList.remove('compact');$('editResults').className='empty';$('editResults').textContent='正在压缩参考图...';let imgs=[];for(const u of uris){let d=Android.imageToDataUrl(u);if(!d)throw new Error('参考图读取/压缩失败，请换一张图片');imgs.push(d)}await cloudGenerate('edit',{prompt:$('eprompt').value,n:parseInt($('enum').value),ratio:$('eratio').value,quality:$('equality').value,images:imgs});toast('任务已排队')}catch(e){toast(e.message||e);log(e.message||e)}}else{let tm=startTimer('editTimer','editResultTime');$('editResultCard').classList.remove('compact');$('editResults').className='empty';$('editResults').textContent='准备编辑...';let r=await call('generateEdit',[s.baseUrl,s.apiKey,s.model,$('eprompt').value,parseInt($('enum').value),$('eratio').value,$('equality').value],$('editBtn'),'编辑中...');if(!r.ok){finishTimer(tm,false);$('editResults').className='empty';$('editResults').textContent='编辑失败：'+r.error;toast(r.error);log(r.error);return}show(r.items,'edit');finishTimer(tm,true);loadHist();toast('编辑完成')}}
$('saveCur').onclick=async()=>{let r=await call('saveCurrentToGallery',[],$('saveCur'),'保存中');toast(r.ok?'已保存 '+r.saved+' 张':r.error)};$('shareCur').onclick=()=>Android.shareCurrent();$('editCur').onclick=()=>Android.editCurrent();
$('saveEdit').onclick=async()=>{let r=await call('saveCurrentToGallery',[],$('saveEdit'),'保存中');toast(r.ok?'已保存 '+r.saved+' 张':r.error)};$('shareEdit').onclick=()=>Android.shareCurrent();$('editEdit').onclick=()=>Android.editCurrent();
loadHist();
</script></body></html>
